<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Hệ thống Đối soát - VPMED</title>
  <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
    body{font-family:Inter,sans-serif;background:#f1f5f9;font-size:12px}.badge{background:#fff;border:1px solid #bfdbfe;color:#1d4ed8;padding:3px 8px;border-radius:6px;font-weight:800;font-size:10px}.box{background:#f8fbff;border:1px solid #dbeafe;border-radius:14px;padding:14px}
  </style>
</head>
<body class="p-4 lg:p-6">
<header class="max-w-7xl mx-auto mb-6 bg-white p-5 rounded-3xl shadow-xl border-b-4 border-blue-900 flex justify-between items-center">
  <div class="flex items-center gap-5"><img src="logo_vpmed.png" class="w-14 h-14 object-contain rounded-xl border p-1 bg-white"><div><h1 class="font-black text-blue-900 uppercase text-xl">BỆNH VIỆN VPMED TÂN HƯNG</h1><p class="text-[10px] text-red-600 font-bold uppercase tracking-widest mt-1 italic">hỗ trợ dược sĩ soát đơn BHYT - tham khảo</p></div></div>
  <div id="ai-status" class="hidden flex items-center gap-3 bg-blue-50 px-5 py-2 rounded-full border border-blue-200"><div class="animate-spin h-3 w-3 border-2 border-blue-600 border-t-transparent rounded-full"></div><span id="status-text" class="text-[10px] font-black text-blue-700 uppercase">Đang xử lý...</span></div>
</header>
<main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
  <div class="lg:col-span-4 space-y-4">
    <div onclick="document.getElementById('file-in').click()" class="bg-white border-2 border-dashed border-slate-300 rounded-[2rem] p-10 text-center hover:border-blue-600 transition-all cursor-pointer shadow-sm"><input type="file" id="file-in" class="hidden" accept="image/*" multiple onchange="handleFiles(this)"><div class="text-5xl mb-3">📁</div><p class="font-black text-slate-500 text-[10px] uppercase">NHẤN ĐỂ TẢI ẢNH ĐƠN THUỐC</p></div>
    <div id="preview-container" class="grid grid-cols-2 gap-2"></div>
    <div class="bg-slate-900 rounded-[1.5rem] p-4 shadow-2xl"><p class="text-[9px] font-black text-blue-400 mb-2 uppercase tracking-widest">DỮ LIỆU THÔ OCR:</p><div id="raw-out" class="text-[9px] text-slate-400 h-36 overflow-y-auto font-mono border-t border-slate-800 pt-2 italic">...</div></div>
  </div>
  <div class="lg:col-span-8 space-y-4">
    <div class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden flex flex-col min-h-[500px]"><div class="bg-slate-900 p-4 text-white flex justify-between items-center shadow-lg"><span class="font-black text-[10px] uppercase tracking-[0.2em]">BẢNG ĐỐI SOÁT CHUYÊN MÔN</span><span class="text-[9px] bg-blue-600 px-3 py-1 rounded-full font-black uppercase italic">VPMED V3</span></div><div id="analysis-zone" class="p-6 space-y-6"><p class="text-center py-40 text-slate-300 font-bold uppercase text-xs tracking-[0.2em]">Đang chờ tải dữ liệu...</p></div></div>
    <button onclick="smartReset()" class="w-full py-4 bg-red-600 text-white font-black rounded-xl hover:bg-red-700 uppercase text-[10px] tracking-[0.4em] shadow-xl">XÓA ĐƠN & QUÉT TIẾP</button>
  </div>
</main>
<script>
let allText='', processedCount=0, totalFiles=0;
function smartReset(){allText='';processedCount=0;totalFiles=0;document.getElementById('preview-container').innerHTML='';document.getElementById('raw-out').innerText='Đang chờ...';document.getElementById('analysis-zone').innerHTML='<p class="text-center py-40 text-slate-300 font-bold uppercase text-xs tracking-[0.2em]">Hệ thống sẵn sàng phân tích...</p>';document.getElementById('file-in').value='';}
async function handleFiles(input){const files=Array.from(input.files);if(!files.length)return;totalFiles=files.length;processedCount=0;allText='';document.getElementById('preview-container').innerHTML='';document.getElementById('ai-status').classList.remove('hidden');for(const file of files){const reader=new FileReader();reader.onload=async e=>{const img=document.createElement('img');img.src=e.target.result;img.className='w-full h-24 object-cover rounded-lg border-2 border-white shadow-sm';document.getElementById('preview-container').appendChild(img);await runOcr(e.target.result,file.name)};reader.readAsDataURL(file)}}
function loadImage(src){return new Promise((ok,err)=>{const img=new Image();img.onload=()=>ok(img);img.onerror=err;img.src=src})}
async function preprocessImage(src){const img=await loadImage(src);const scale=Math.max(2,Math.min(4,Math.round(2400/img.width)));const c=document.createElement('canvas');c.width=img.width*scale;c.height=img.height*scale;const x=c.getContext('2d',{willReadFrequently:true});x.imageSmoothingEnabled=true;x.drawImage(img,0,0,c.width,c.height);const id=x.getImageData(0,0,c.width,c.height),d=id.data;for(let i=0;i<d.length;i+=4){let g=.299*d[i]+.587*d[i+1]+.114*d[i+2];g=g<185?0:255;d[i]=d[i+1]=d[i+2]=g}x.putImageData(id,0,0);return c.toDataURL('image/png')}
async function runOcr(data,name){const img=await preprocessImage(data);const r=await Tesseract.recognize(img,'vie+eng',{preserve_interword_spaces:'1',tessedit_pageseg_mode:'6'});allText+=`\n--- SOURCE: ${name} ---\n`+r.data.text;processedCount++;document.getElementById('status-text').innerText=`QUÉT: ${processedCount}/${totalFiles}`;if(processedCount===totalFiles){document.getElementById('raw-out').innerText=allText;performAudit()}}
function vn(s){return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/Đ/g,'D').replace(/đ/g,'d')}
function uniq(a){return [...new Set((a||[]).filter(Boolean))]}
function normalizeIcdToken(token){if(!token)return null;let t=token.toUpperCase().trim().replace(/[;,：:]/g,'.').replace(/\s+/g,'').replace(/[^A-Z0-9.]/g,'');if(t.length<3)return null;const first=t[0].replace('0','O');let rest=t.slice(1).replace(/[OQD]/g,'0').replace(/[IL|!]/g,'1').replace(/S/g,'5').replace(/B/g,'8').replace(/Z/g,'2');t=first+rest;let m=t.match(/^([A-Z])(\d{2})(\d)$/);if(m)t=`${m[1]}${m[2]}.${m[3]}`;return /^[A-Z]\d{2}(?:\.\d+)?$/.test(t)?t:null}
function findIcds(text){const out=[];const re=/\b[A-Z0-9][0-9OQDIL|!SBZ]{2}(?:[\.,][0-9OQDIL|!SBZ]+)?\b/g;let m;const src=(text||'').toUpperCase();while((m=re.exec(src))!==null){const c=normalizeIcdToken(m[0]);if(c)out.push(c)}return uniq(out)}
function regionAfter(text,labels,stops){const lines=(text||'').split(/\n+/);for(let i=0;i<lines.length;i++){const n=vn(lines[i]).toUpperCase();if(labels.some(p=>p.test(n))){let b=lines[i];for(let j=i+1;j<Math.min(lines.length,i+6);j++){const n2=vn(lines[j]).toUpperCase();if((stops||[]).some(p=>p.test(n2)))break;b+=' '+lines[j]}return b}}return''}
function extractIcdGroups(text){const mainRegion=regionAfter(text,[/MA\s*BENH.*ICD\s*[- ]?10/,/MA\s*BENH\s*CHINH/,/CHAN\s*DOAN\s*[:\-]/],[/MA\s*BENH\s*KEM/,/BENH\s*KEM/,/THUOC\s*DIEU\s*TRI/]);const subRegion=regionAfter(text,[/MA\s*BENH\s*KEM\s*THEO/,/BENH\s*KEM\s*THEO/,/CHAN\s*DOAN\s*KEM\s*THEO/],[/THUOC\s*DIEU\s*TRI/]);let main=findIcds(mainRegion)[0]||null;let sub=findIcds(subRegion);const all=findIcds(text);if(main==='K00'&&all.some(c=>c!=='K00'))main=all.find(c=>c!=='K00');sub=sub.filter(c=>c!==main);return{main_icd:main,sub_icd:uniq(sub),all_icd:uniq([main,...sub,...all].filter(Boolean))}}
function extractDrugBlock(text){const lines=(text||'').split(/\n+/);let s=-1;for(let i=0;i<lines.length;i++){const n=vn(lines[i]).toUpperCase();if(/THUOC\s*DIEU\s*TRI/.test(n)){s=i+1;break}}return s<0?'':lines.slice(s).join('\n')}
function cleanDrugName(s){return s.trim().replace(/^\s*\d+\s*[\.):-]?\s*/,'').replace(/^[-–—•]+\s*/,'').replace(/\s{2,}/g,' ').replace(/\s+\d+\s*(VIÊN|VIEN|GÓI|GOI|ỐNG|ONG|LỌ|LO|CHAI|TUÝP|TUYP)\s*$/i,'').trim()}
function extractDrugs(text){const block=extractDrugBlock(text);if(!block)return[];const lines=block.split(/\n+/).map(x=>x.trim()).filter(Boolean);const out=[];const trash=/(UỐNG|UONG|NGÀY|NGAY|MỖI|MOI|LẦN|LAN|SÁNG|SANG|TỐI|TOI|SAU\s*ĂN|SAU\s*AN|TRƯỚC\s*ĂN|TRUOC\s*AN|CHẨN\s*ĐOÁN|CHAN\s*DOAN|MÃ\s*BỆNH|MA\s*BENH|ICD)/i;for(const line of lines){const n=vn(line).toUpperCase();if(trash.test(line)||trash.test(n)||/^---\s*SOURCE/i.test(line))continue;const dose=/\b\d+(?:[\.,]\d+)?\s*(MG|G|ML|MCG|IU|%)\b/i.test(line);const drugLike=/[A-Za-zÀ-ỹ]{4,}/.test(line)&&!findIcds(line).length;if(dose||drugLike){const name=cleanDrugName(line);if(name.length>=4&&!trash.test(vn(name).toUpperCase()))out.push(name)}}return uniq(out).slice(0,50)}
const DRUG_RULES=[{icdPrefix:'K29',drugContains:['ESOMEPRAZOL','OMEPRAZOL','PANTOPRAZOL','RABEPRAZOL'],note:'Nhóm PPI phù hợp bệnh dạ dày/tá tràng.'},{icdPrefix:'K52',drugContains:['METRONIDAZOL'],note:'Có thể phù hợp viêm đại tràng/nhiễm khuẩn theo chỉ định bác sĩ.'},{icdPrefix:'E78',drugContains:['ATORVASTATIN','ROSUVASTATIN','SIMVASTATIN'],note:'Nhóm statin phù hợp rối loạn lipid máu.'}];
function evalDrug(drug,icds){const d=vn(drug).toUpperCase();for(const r of DRUG_RULES){if(r.drugContains.some(k=>d.includes(k))){const ok=icds.some(c=>c.startsWith(r.icdPrefix));return ok?{ok:true,text:'✓ GHI NHẬN',note:r.note}:{ok:false,text:'⚠ KIỂM TRA',note:`Thuốc gợi ý cần mã ${r.icdPrefix} trong chẩn đoán.`}}}return{ok:true,text:'✓ GHI NHẬN',note:'Đã nhận diện tên thuốc. Cần đối chiếu thêm theo rule chuyên môn.'}}
function badge(c){return`<span class="badge">${c}</span>`}
function performAudit(){const z=document.getElementById('analysis-zone');const icd=extractIcdGroups(allText);const drugs=extractDrugs(allText);const all=icd.all_icd||[];const rows=drugs.map(d=>{const e=evalDrug(d,all);return`<tr class="border-b border-slate-50 hover:bg-slate-50"><td class="p-4"><div class="font-bold text-slate-800 text-[11px] uppercase">${d}</div><div class="text-[9px] text-slate-400 mt-0.5">● ${e.note}</div></td><td class="p-4 text-center text-[10px] font-black ${e.ok?'text-green-600':'text-red-600'}">${e.text}</td></tr>`}).join('');z.innerHTML=`<div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="box"><p class="text-[9px] font-black text-blue-800 uppercase mb-2">Mã bệnh chính ICD-10:</p><div class="flex flex-wrap gap-1">${icd.main_icd?badge(icd.main_icd):'<span class="text-red-500 text-[10px] font-bold">Chưa nhận diện được</span>'}</div></div><div class="box"><p class="text-[9px] font-black text-blue-800 uppercase mb-2">Mã bệnh kèm theo:</p><div class="flex flex-wrap gap-1">${icd.sub_icd.length?icd.sub_icd.map(badge).join(''):'<span class="text-slate-400 text-[10px] font-bold">Không có</span>'}</div></div></div><div class="bg-slate-50 p-4 rounded-xl border border-slate-200"><p class="text-[9px] font-black text-slate-500 uppercase mb-2">Tất cả mã ICD phát hiện:</p><div class="flex flex-wrap gap-1">${all.length?all.map(badge).join(''):'<span class="text-red-500 text-[10px] font-bold">Chưa nhận diện được mã ICD</span>'}</div></div><div class="overflow-hidden rounded-xl border border-slate-200 shadow-sm"><table class="w-full text-left bg-white"><thead class="bg-slate-50 text-[9px] font-black text-slate-500 uppercase"><tr><th class="p-3">Tên thuốc nhận diện</th><th class="p-3 text-center">Đánh giá</th></tr></thead><tbody>${rows||'<tr><td colspan="2" class="p-10 text-center text-slate-300">Chưa nhận diện được tên thuốc.</td></tr>'}</tbody></table></div>`;document.getElementById('ai-status').classList.add('hidden')}
</script>
</body>
</html>
