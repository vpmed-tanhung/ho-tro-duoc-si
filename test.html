<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Clinical DSS v25.0 - Phân Tích Chuyên Sâu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .timeline-line::before { content: ''; position: absolute; left: 31px; top: 0; bottom: 0; width: 2px; background: #e2e8f0; }
        .hidden-screen { display: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen text-slate-900">

    <div class="max-w-[1600px] mx-auto p-4 lg:p-8">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase text-slate-800">Clinical <span class="text-blue-600">DSS v25.0</span></h1>
                <p class="text-[10px] font-bold text-rose-500 tracking-[0.3em] uppercase italic">Phân tích dược lâm sàng chuyên sâu theo mốc thời gian</p>
            </div>
            <div class="flex bg-slate-50 p-2 rounded-2xl gap-2">
                <button onclick="switchTab('main')" id="btn-main" class="px-8 py-3 rounded-xl text-[10px] font-black uppercase bg-slate-900 text-white shadow-lg">Phòng Phân Tích</button>
                <button onclick="switchTab('archive')" id="btn-archive" class="px-8 py-3 rounded-xl text-[10px] font-black uppercase text-slate-400">Kho Lưu Trữ</button>
                <button onclick="resetAllData()" class="px-6 py-3 rounded-xl text-[10px] font-black uppercase bg-rose-600 text-white shadow-lg ml-4">Làm mới toàn bộ</button>
            </div>
        </header>

        <div id="screen-main" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-3 space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <h3 class="text-[10px] font-black text-blue-600 mb-6 uppercase tracking-widest italic">1. Chỉ số từ phiếu xét nghiệm</h3>
                    <input type="file" id="labImg" multiple onchange="processLabImages(this)" class="hidden">
                    <label for="labImg" class="w-full block text-center bg-slate-900 text-white py-5 rounded-2xl text-[10px] font-black cursor-pointer uppercase shadow-xl mb-6 hover:bg-blue-600 transition-all">Quét tất cả phiếu XN</label>
                    <div id="anomalyList" class="space-y-4 max-h-[500px] overflow-y-auto pr-2"></div>
                </div>

                <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-2xl">
                    <h3 class="text-[10px] font-black opacity-40 mb-6 uppercase tracking-widest text-center">Thông số bệnh nhân</h3>
                    <div class="space-y-4">
                        <input type="text" id="pName" placeholder="Tên bệnh nhân" class="w-full bg-white/5 p-4 rounded-xl font-bold border-none outline-none focus:ring-1 focus:ring-blue-500">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="pAge" oninput="calcEgfr()" placeholder="Tuổi" class="w-full bg-white/5 p-4 rounded-xl font-bold border-none">
                            <input type="number" id="pWeight" oninput="calcEgfr()" placeholder="Nặng" class="w-full bg-white/5 p-4 rounded-xl font-bold border-none">
                        </div>
                        <div class="p-5 bg-rose-500/10 rounded-2xl border border-rose-500/20">
                            <label class="text-[8px] font-black text-rose-400 uppercase">Creatinine (µmol/L)</label>
                            <input type="number" id="manualCreat" oninput="calcEgfr()" class="w-full bg-transparent text-3xl font-black text-rose-500 outline-none" placeholder="0.0">
                        </div>
                        <div class="pt-4 flex justify-between items-center border-t border-white/10">
                            <span class="text-[10px] font-black opacity-30 uppercase">eGFR (MDRD):</span>
                            <span id="resEgfr" class="text-4xl font-black text-blue-400 italic">--</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-8 rounded-[3.5rem] shadow-sm border border-slate-100">
                    <h3 class="text-[10px] font-black text-slate-400 mb-6 uppercase tracking-widest italic">2. Diễn biến & Y lệnh</h3>
                    <input type="date" id="oDate" class="w-full p-4 bg-slate-50 rounded-2xl font-bold mb-4 border-none outline-none">
                    <textarea id="clin" rows="3" class="w-full bg-slate-50 p-5 rounded-[2rem] text-[12px] mb-3 border-none outline-none focus:ring-2 focus:ring-blue-100" placeholder="Tóm tắt bệnh cảnh..."></textarea>
                    <textarea id="ord" rows="8" class="w-full bg-blue-50/50 p-6 rounded-[2rem] text-[12px] font-mono font-bold text-blue-900 mb-6 border-none outline-none leading-relaxed" placeholder="Y lệnh thuốc hàng ngày..."></textarea>
                    <button onclick="addToTimeline()" class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black text-[11px] uppercase tracking-widest shadow-xl hover:bg-blue-700">Ghi nhận mốc y lệnh</button>
                </div>
            </div>

            <div class="lg:col-span-5 space-y-8">
                <div class="flex gap-4">
                    <button onclick="deepClinicalAudit()" class="flex-1 bg-slate-900 text-white py-6 rounded-[3rem] font-black text-[11px] uppercase tracking-widest shadow-2xl hover:scale-[1.02]">Phân tích chuyên sâu</button>
                    <button onclick="saveRecord()" class="px-10 bg-green-600 text-white py-6 rounded-[3rem] font-black text-[11px] uppercase shadow-2xl">Lưu hồ sơ</button>
                </div>

                <div id="auditBox" class="hidden bg-white p-10 rounded-[4rem] border-4 border-rose-500 shadow-2xl">
                    <h2 class="text-xl font-black text-rose-600 uppercase italic mb-8">Báo cáo Dược lâm sàng chuyên sâu</h2>
                    <div id="auditContent" class="space-y-6 text-xs font-bold text-slate-800 leading-relaxed"></div>
                </div>

                <div id="timelineContainer" class="relative pl-16 space-y-10 timeline-line"></div>
            </div>
        </div>

        <div id="screen-archive" class="hidden-screen space-y-8">
            <div class="bg-white p-10 rounded-[4rem] shadow-sm border border-slate-100 min-h-[500px]">
                <h2 class="text-3xl font-black italic uppercase mb-10 tracking-tighter">Kho bệnh án</h2>
                <div id="archiveGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>
        </div>
    </div>

    <script>
        let allLabs = [];
        let masterTimeline = [];
        let db = JSON.parse(localStorage.getItem('med_v25') || '[]');

        function processLabImages(input) {
            allLabs = [];
            Array.from(input.files).forEach((file, i) => {
                const dates = ["19/04/2026", "21/04/2026", "23/04/2026"]; // Mock trích xuất ngày
                const d = dates[i] || "25/04/2026";
                allLabs.push(
                    { date: d, name: "Kali máu", val: 5.9, ref: "3.5-5.1" },
                    { date: d, name: "Glucose", val: 12.8, ref: "3.9-6.4" },
                    { date: d, name: "Creatinine", val: 195, ref: "62-115" }
                );
            });
            renderLabs();
        }

        function renderLabs() {
            const wrap = document.getElementById('anomalyList');
            const grouped = allLabs.reduce((acc, obj) => {
                if (!acc[obj.date]) acc[obj.date] = [];
                acc[obj.date].push(obj);
                return acc;
            }, {});
            wrap.innerHTML = Object.keys(grouped).map(d => `
                <div class="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100">
                    <h4 class="text-[9px] font-black text-blue-600 uppercase mb-4 tracking-widest border-b pb-2">Phiếu ngày: ${d}</h4>
                    <div class="space-y-2">
                        ${grouped[d].map(it => `<div class="flex justify-between bg-white p-3 rounded-xl shadow-sm"><span class="text-[10px] font-black">${it.name}</span><span class="text-rose-600 font-black">${it.val}</span></div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function calcEgfr() {
            const age = document.getElementById('pAge').value, w = document.getElementById('pWeight').value, creat = document.getElementById('manualCreat').value;
            if (age && w && creat) {
                let res = ((140 - age) * w) / (0.814 * creat);
                document.getElementById('resEgfr').innerText = res.toFixed(1);
            }
        }

        function addToTimeline() {
            const date = document.getElementById('oDate').value, egfr = document.getElementById('resEgfr').innerText, ord = document.getElementById('ord').value;
            if(!date || !ord) return alert("Thiếu dữ liệu!");
            masterTimeline.push({ date, egfr, clin: document.getElementById('clin').value, ord });
            masterTimeline.sort((a,b) => new Date(a.date) - new Date(b.date));
            renderTimeline();
        }

        function renderTimeline() {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = masterTimeline.slice().reverse().map(t => `
                <div class="relative bg-white p-8 rounded-[3.5rem] border border-slate-100 shadow-sm">
                    <div class="absolute -left-[41px] top-4 w-6 h-6 bg-slate-900 rounded-full border-4 border-white shadow-lg"></div>
                    <div class="flex justify-between items-center mb-6">
                        <span class="px-4 py-1 bg-slate-50 rounded-full text-[9px] font-black text-slate-400 uppercase">${t.date}</span>
                        <div class="text-right"><div class="text-2xl font-black text-blue-600 italic">eGFR: ${t.egfr}</div></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="text-slate-400 italic text-[12px] border-l-2 pl-4">${t.clin || '...'}</div>
                        <div class="bg-blue-50/50 p-6 rounded-[2rem] font-mono font-bold text-blue-900 text-[12px]">${t.ord}</div>
                    </div>
                </div>
            `).join('');
        }

        function deepClinicalAudit() {
            const box = document.getElementById('auditBox'), content = document.getElementById('auditContent');
            let findings = [];
            
            masterTimeline.forEach(t => {
                const e = parseFloat(t.egfr), o = t.ord.toLowerCase();
                const relatedLab = allLabs.filter(l => l.date === t.date || true); // Tìm XN gần nhất
                const k = relatedLab.find(l => l.name === "Kali máu");

                if(k && k.val > 5.5) {
                    findings.push(`[Mốc ${t.date}] NGUY CƠ: Kali máu ${k.val} (Tăng Kali). Y lệnh thiếu thuốc hạ Kali cấp cứu (Calci, Insulin+Glucose).`);
                }
                if(e < 45 && o.includes("insulin")) {
                    findings.push(`[Mốc ${t.date}] DƯỢC ĐỘNG HỌC: eGFR ${e} (Suy thận 3b). Insulin tích lũy gây hạ đường huyết muộn. Cần test đường máu mao mạch.`);
                }
                if(e < 30 && o.includes("kháng sinh")) {
                    findings.push(`[Mốc ${t.date}] LIỀU DÙNG: Cần hiệu chỉnh liều kháng sinh theo TT 31/2021/TT-BYT.`);
                }
            });

            if(findings.length > 0) {
                box.classList.remove('hidden');
                content.innerHTML = findings.map(f => `<div class="p-5 bg-rose-50 rounded-[2rem] border-l-8 border-rose-600">❌ ${f}</div>`).join('');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else { alert("Chưa phát hiện sai sót lâm sàng nghiêm trọng."); }
        }

        function resetAllData() {
            if(confirm("Xóa sạch để nhập mới?")) {
                masterTimeline = []; allLabs = [];
                document.querySelectorAll('input, textarea').forEach(i => i.value = "");
                document.getElementById('resEgfr').innerText = "--";
                document.getElementById('anomalyList').innerHTML = "";
                document.getElementById('auditBox').classList.add('hidden');
                renderTimeline();
            }
        }

        function saveRecord() {
            const name = document.getElementById('pName').value || "Ẩn danh";
            db.push({ id: Date.now(), name, timeline: [...masterTimeline], stamp: new Date().toLocaleString() });
            localStorage.setItem('med_v25', JSON.stringify(db));
            renderArchive(); alert("Đã lưu.");
        }

        function renderArchive() {
            const grid = document.getElementById('archiveGrid');
            grid.innerHTML = db.map(r => `<div class="bg-white p-8 rounded-[3.5rem] border shadow-sm">
                <div class="text-[9px] font-black text-blue-600 mb-2">${r.stamp}</div>
                <div class="text-xl font-black uppercase italic mb-4">${r.name}</div>
                <button onclick="deleteRec(${r.id})" class="text-rose-500 font-black text-[10px]">XÓA</button>
            </div>`).join('');
        }

        function deleteRec(id) { db = db.filter(r => r.id !== id); localStorage.setItem('med_v25', JSON.stringify(db)); renderArchive(); }
        function switchTab(t) {
            document.getElementById('screen-main').classList.toggle('hidden-screen', t !== 'main');
            document.getElementById('screen-archive').classList.toggle('hidden-screen', t !== 'archive');
        }
        renderArchive();
    </script>
</body>
</html>
